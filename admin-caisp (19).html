<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Caisp Central</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#1D9E75;--green-d:#0F6E56;--green-l:#EAF3DE;--grafite:#2D3748;--grafite-d:#1A202C;--grafite-l:#EDF2F7;--red:#E24B4A;--red-l:#FCEBEB;--amber:#EF9F27;--amber-l:#FAEEDA;--blue:#378ADD;--blue-l:#E6F1FB;--bg:#F4F6F3;--surface:#fff;--surface2:#F0F2EF;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#1A1F1C;--text2:#5A6560;--text3:#9AA39E;--r:10px;--r-sm:7px;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.brand-icon svg{width:20px;height:20px;fill:white;}
.brand-name{font-size:15px;font-weight:600;}
.brand-sub{font-size:11px;color:var(--text2);}
.admin-badge{font-size:11px;font-weight:600;padding:4px 10px;background:#EDF2F7;color:#2D3748;border-radius:20px;}
.btn-logout{background:none;border:1px solid var(--border2);border-radius:var(--r-sm);padding:6px 14px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text2);cursor:pointer;}
.main{display:flex;flex:1;}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:1rem 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.si{display:flex;align-items:center;gap:10px;padding:9px 1.5rem;cursor:pointer;font-size:13px;color:var(--text2);border-left:3px solid transparent;transition:all 0.15s;}
.si:hover{background:var(--surface2);color:var(--text);}
.si.active{background:var(--grafite-l,#EDF2F7);color:var(--grafite,#2D3748);border-left-color:var(--grafite,#2D3748);font-weight:600;}
.si svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.si-sep{height:1px;background:var(--border);margin:6px 1rem;}
.si-group{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;padding:8px 1.5rem 4px;}
.content{flex:1;padding:2rem;overflow-y:auto;}
.page{display:none;}
.page.active{display:block;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px;}
.page-title{font-size:20px;font-weight:600;}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px;}
.btn{padding:9px 18px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;border:none;border-radius:var(--r-sm);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;}
.btn:active{transform:scale(0.98);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:var(--grafite-d,#1A202C);}
.btn-red{background:var(--red-l);color:var(--red);}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-outline:hover{background:var(--surface2);}
.btn-amber{background:var(--amber-l);color:#854F0B;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
.metric{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;}
.metric-lbl{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;}
.metric-val{font-size:28px;font-weight:600;margin:4px 0 2px;line-height:1;}
.metric-sub{font-size:11px;color:var(--text3);}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem;}
.chart-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:1.2rem;}
.chart-card.full{grid-column:1/-1;}
.chart-title{font-size:13px;font-weight:600;margin-bottom:1rem;}
.chart-wrap{position:relative;height:220px;}
.table-wrap{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;overflow-x:auto;margin-bottom:1.5rem;}
.table-toolbar{padding:12px 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;}
.toolbar-title{font-size:13px;font-weight:600;}
.search-input{padding:7px 12px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);outline:none;width:200px;}
.search-input:focus{border-color:var(--green);background:#fff;}
.filter-select{padding:7px 12px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);outline:none;}
table{width:100%;border-collapse:collapse;min-width:500px;}
thead tr{background:var(--surface2);}
th{padding:10px 14px;font-size:11px;font-weight:600;color:var(--text2);text-align:left;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;}
td{padding:11px 14px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:#fafbfa;}
.td-actions{display:flex;gap:6px;}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.tag-green{background:var(--green-l);color:var(--green-d);}
.tag-amber{background:var(--amber-l);color:#854F0B;}
.tag-blue{background:var(--blue-l);color:#0C447C;}
.tag-red{background:var(--red-l);color:var(--red);}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge-ok{background:var(--green-l);color:var(--green-d);}
.badge-prox{background:var(--amber-l);color:#854F0B;}
.badge-atrasado{background:var(--red-l);color:var(--red);}
.bloq-sim{background:var(--red-l);color:var(--red);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.bloq-nao{background:var(--green-l);color:var(--green-d);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.insumo-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
.insumo-row:last-child{border-bottom:none;}
.insumo-bar-wrap{width:120px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.insumo-bar{height:100%;background:var(--green);border-radius:3px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border-radius:14px;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:1.2rem;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border);}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field label{font-size:12px;color:var(--text2);font-weight:500;}
.field input,.field select,.field textarea{padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);outline:none;}
.field input:focus,.field select:focus{border-color:var(--green);background:#fff;}
.field textarea{resize:none;height:90px;line-height:1.5;}
#toast{position:fixed;bottom:2rem;right:2rem;background:#1A1F1C;color:#fff;font-size:13px;padding:10px 18px;border-radius:20px;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none;}
#toast.show{opacity:1;}
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;}
#login-screen.hidden{display:none;}
.login-box{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:2rem;width:340px;}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-icon{width:64px;height:64px;background:var(--green);border-radius:18px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;}
.login-icon svg{width:36px;height:36px;fill:white;}
.login-title{font-size:18px;font-weight:600;}
.login-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.login-btn{width:100%;padding:11px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;background:#2D3748;color:#fff;border:none;border-radius:var(--r-sm);cursor:pointer;margin-top:4px;}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:10px;}
.loading{text-align:center;padding:2rem;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;}
.form-section{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:1.5rem;max-width:560px;margin-bottom:1.5rem;}
.form-section-title{font-size:14px;font-weight:600;margin-bottom:1rem;padding-bottom:8px;border-bottom:1px solid var(--border);}
@media(max-width:900px){.metrics{grid-template-columns:1fr 1fr;}.charts-grid{grid-template-columns:1fr;}.sidebar{display:none;}.content{padding:1rem;}}
