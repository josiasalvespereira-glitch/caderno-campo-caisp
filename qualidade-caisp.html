<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#E24B4A"/>
<title>Caisp Qualidade</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#E24B4A;--red-l:#FCEBEB;--red-d:#A32D2D;--green:#1D9E75;--green-l:#EAF3DE;--green-d:#0F6E56;--amber:#EF9F27;--amber-l:#FAEEDA;--blue:#378ADD;--blue-l:#E6F1FB;--bg:#FDF4F4;--surface:#fff;--surface2:#F9EDED;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#1A1F1C;--text2:#5A6560;--text3:#9AA39E;--r:12px;--r-sm:8px;}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.app{max-width:960px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.hidden{display:none!important;}
#toast{position:fixed;bottom:2rem;right:2rem;background:#1A1F1C;color:#fff;font-size:13px;padding:10px 18px;border-radius:20px;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none;}
#toast.show{opacity:1;}

/* LOGIN */
#screen-login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;}
#screen-login.hidden{display:none;}
.login-box{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:2rem;width:340px;}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-icon{width:64px;height:64px;background:var(--red);border-radius:18px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;}
.login-icon svg{width:36px;height:36px;stroke:white;fill:none;stroke-width:1.8;stroke-linecap:round;}
.login-title{font-size:18px;font-weight:600;}
.login-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500;}
.field input{width:100%;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);outline:none;}
.field input:focus{border-color:var(--red);}
.login-btn{width:100%;padding:11px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;background:var(--red);color:#fff;border:none;border-radius:var(--r-sm);cursor:pointer;margin-top:4px;}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:10px;}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.brand-icon svg{width:20px;height:20px;stroke:white;fill:none;stroke-width:1.8;stroke-linecap:round;}
.brand-name{font-size:15px;font-weight:600;}
.brand-sub{font-size:11px;color:var(--text2);}
.qual-badge{font-size:11px;font-weight:600;padding:4px 10px;background:var(--red-l);color:var(--red-d);border-radius:20px;}
.btn-logout{background:none;border:1px solid var(--border2);border-radius:var(--r-sm);padding:6px 14px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text2);cursor:pointer;}

/* CONTENT */
.content{flex:1;padding:2rem;display:flex;flex-direction:column;gap:1.5rem;}

/* HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.page-title{font-size:20px;font-weight:600;}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px;}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.metric{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;}
.metric-lbl{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;}
.metric-val{font-size:28px;font-weight:600;margin:4px 0 2px;line-height:1;}
.metric-sub{font-size:11px;color:var(--text3);}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:4px;}
.tab-btn{flex:1;padding:8px 16px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;border:none;border-radius:8px;cursor:pointer;background:transparent;color:var(--text2);transition:all 0.15s;}
.tab-btn.active{background:var(--red);color:white;font-weight:600;}

/* TABLE */
.table-wrap{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;overflow-x:auto;}
.table-toolbar{padding:12px 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;}
.toolbar-title{font-size:13px;font-weight:600;}
.search-input{padding:7px 12px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);outline:none;width:200px;}
.search-input:focus{border-color:var(--red);}
.filter-select{padding:7px 12px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);outline:none;}
table{width:100%;border-collapse:collapse;min-width:600px;}
thead tr{background:var(--surface2);}
th{padding:10px 14px;font-size:11px;font-weight:600;color:var(--text2);text-align:left;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;}
td{padding:11px 14px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:#fdf9f9;}
.td-actions{display:flex;gap:6px;flex-wrap:wrap;}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.tag-red{background:var(--red-l);color:var(--red-d);}
.tag-green{background:var(--green-l);color:var(--green-d);}
.tag-amber{background:var(--amber-l);color:#854F0B;}
.bloq-sim{background:var(--red-l);color:var(--red);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.bloq-nao{background:var(--green-l);color:var(--green-d);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.lido-ok{background:var(--green-l);color:var(--green-d);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.lido-nao{background:var(--amber-l);color:#854F0B;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}

/* FORM NOVA NOTIFICAÇÃO */
.form-section{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:1.5rem;}
.form-section-title{font-size:14px;font-weight:600;margin-bottom:1rem;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--red-d);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-full{grid-column:1/-1;}
.field-label{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px;}
.form-inp{width:100%;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);outline:none;}
.form-inp:focus{border-color:var(--red);}
.form-ta{resize:none;height:80px;line-height:1.5;}
.btn-red-full{width:100%;padding:12px;background:var(--red);color:white;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px;}
.upload-label{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px dashed var(--border2);border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:var(--text2);background:var(--surface2);}
.upload-label svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:1.8;stroke-linecap:round;}

/* BTN */
.btn{padding:7px 14px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;border:none;border-radius:var(--r-sm);cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-red-sm{background:var(--red-l);color:var(--red);}
.btn-green-sm{background:var(--green-l);color:var(--green-d);}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border-radius:14px;padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:1.2rem;color:var(--red-d);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border);}

.loading{text-align:center;padding:2rem;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1rem;}
.charts-row.full{grid-template-columns:1fr;}
.chart-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:1.2rem;}
.chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;}
.chart-wrap{position:relative;height:220px;}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.rank-item:last-child{border-bottom:none;}
.rank-num{width:24px;height:24px;border-radius:50%;background:var(--red-l);color:var(--red-d);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rank-info{flex:1;}
.rank-nome{font-size:13px;font-weight:500;}
.rank-det{font-size:11px;color:var(--text2);}
.rank-val{font-size:14px;font-weight:600;color:var(--red);}
.rank-bar-wrap{width:80px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.rank-bar{height:100%;background:var(--red);border-radius:3px;}
.aceite-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:1.2rem;}
.aceite-title{font-size:13px;font-weight:600;margin-bottom:1rem;}
.aceite-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.aceite-row:last-child{border-bottom:none;}
.aceite-prod{font-size:13px;font-weight:500;}
.aceite-det{font-size:11px;color:var(--text2);}
.aceite-status{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.aceite-ok{background:var(--green-l);color:var(--green-d);}
.aceite-bloq{background:var(--red-l);color:var(--red-d);}
@media(max-width:700px){.charts-row{grid-template-columns:1fr;}}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px;}

@media(max-width:700px){.metrics{grid-template-columns:1fr 1fr;}.form-grid{grid-template-columns:1fr;}.content{padding:1rem;}}
